<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reset Password — Dawamu</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--forest:#0B2E0D;--leaf:#2A8530;--sage:#4CAF50;--white:#fff;--red:#dc2626;--border:#e5e7eb;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--forest);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:#fff;border-radius:16px;padding:36px;width:100%;max-width:420px;box-shadow:0 25px 50px rgba(0,0,0,.3);}
h1{font-family:'Playfair Display',serif;font-size:24px;margin-bottom:6px;color:var(--forest);}
.sub{font-size:13px;color:#6b7280;margin-bottom:24px;}
.form-group{margin-bottom:16px;}
label{display:block;font-size:12.5px;font-weight:700;margin-bottom:6px;}
input{width:100%;padding:11px 13px;border-radius:8px;border:1.5px solid var(--border);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:.18s;}
input:focus{border-color:var(--sage);box-shadow:0 0 0 3px rgba(76,175,80,.1);}
.btn{width:100%;padding:13px;border-radius:8px;background:var(--leaf);color:#fff;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:.18s;}
.btn:hover{background:#1C6320;}
.msg{padding:12px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;}
.msg.error{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;}
.msg.success{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7;}
.back{display:block;text-align:center;margin-top:16px;font-size:13px;color:#6b7280;text-decoration:none;}
.back:hover{color:var(--leaf);}
</style>
</head>
<body>
<div class="card">
  <h1>Reset Admin Password</h1>
  <p class="sub">Enter your new password below.</p>
  <div class="msg" id="msg"></div>
  <div class="form-group">
    <label>New Password</label>
    <input type="password" id="pw1" placeholder="Minimum 6 characters">
  </div>
  <div class="form-group">
    <label>Confirm Password</label>
    <input type="password" id="pw2" placeholder="Re-enter password">
  </div>
  <button class="btn" onclick="doReset()">Reset Password</button>
  <a class="back" href="/">← Back to Login</a>
</div>
<script>
const token = new URLSearchParams(location.search).get('token');
if (!token) { document.querySelector('.sub').textContent = 'Invalid reset link.'; }

async function doReset() {
  const p1 = document.getElementById('pw1').value;
  const p2 = document.getElementById('pw2').value;
  const msg = document.getElementById('msg');
  if (p1.length < 6) { showMsg('Password must be at least 6 characters.','error'); return; }
  if (p1 !== p2) { showMsg('Passwords do not match.','error'); return; }
  const r = await fetch('/api/admin/reset-password', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ token, new_password: p1 })
  });
  const d = await r.json();
  if (!r.ok) { showMsg(d.error || 'Error.','error'); return; }
  showMsg('Password reset successfully! Redirecting...','success');
  setTimeout(() => window.location.href = '/', 2000);
}
function showMsg(txt, type) {
  const el = document.getElementById('msg');
  el.textContent = txt; el.className = 'msg '+type; el.style.display='block';
}
</script>
</body>
</html>
